<!DOCTYPE html>
<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h1>Fitness Planner</h1>

<a href="/add-plan" class="btn btn-primary mb-3">Dodaj Plan</a>

<table class="table">
<tr>
<th>Naziv</th>
<th>Kalorije</th>
<th>Akcije</th>
</tr>

{% for p in plans %}
<tr>
<td>{{p.naziv}}</td>
<td>{{p.kalorije}}</td>
<td>Pregled</td>
</tr>
{% endfor %}

</table>

</body>
</html>
